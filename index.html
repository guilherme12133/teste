<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #F8FAFC; 
            color: #0F172A; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .perfil-container {
            width: 500px;
            padding: 20px 0;
        }

        .perfil-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .foto-perfil {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #3B82F6; 
        }

        .perfil-header h2 {
            margin-top: 10px;
            color: #0F172A;
        }

        .card {
            background: #FFFFFF; 
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid #E2E8F0; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .card h3 {
            color: #3B82F6; 
            margin-bottom: 15px;
        }

        .card p {
            margin-bottom: 10px;
            color: #64748B; 
        }

        .card p strong {
            color: #0F172A;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #0F172A;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            background: #F8FAFC; 
            color: #0F172A; 
            border: 1px solid #E2E8F0; 
            border-radius: 8px;
            outline: none;
        }

        .form-group input:focus {
            border-color: #3B82F6; 
        }

        .form-group input::placeholder {
            color: #64748B; 
        }

        .btn {
            width: 100%;
            padding: 12px;
            background-color: #3B82F6; 
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        .btn:hover {
            background-color: #2563EB; 
        }

        .tema {
            margin-bottom: 15px;
            color: #0F172A;
        }

        .btn-sair {
            width: 100%;
            padding: 12px;
            background-color: #EF4444; 
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        .btn-sair:hover {
            background-color: #DC2626; 
        }

        #mensagem {
            margin-top: 15px;
            text-align: center;
            color: #22C55E; 
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="perfil-container">

        <div class="perfil-header">
            <img
                src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
                alt="Foto de Perfil"
                class="foto-perfil"
            >
            <h2>Meu Perfil</h2>
        </div>

        <div class="card">
            <h3>Informações</h3>
            <p><strong>Nome:</strong> James Fernando</p>
            <p><strong>Email:</strong> jamesjames2026@gmail.com</p>
            <p><strong>Data de Cadastro:</strong> 31/05/2026</p>
        </div>

        <form id="perfilForm" class="card">
            <h3>Configurações</h3>

            <div class="form-group">
                <label for="nome">Alterar Nome</label>
                <input
                    type="text"
                    id="nome"
                    placeholder="Digite um novo nome"
                >
            </div>

            <div class="form-group">
                <label for="senha">Alterar Senha</label>
                <input
                    type="password"
                    id="senha"
                    placeholder="Digite uma nova senha"
                >
            </div>

            <p class="tema">
                <strong>Tema:</strong> ☀️ Claro
            </p>

            <button type="submit" class="btn">
                Salvar Alterações
            </button>
        </form>

        <div class="card">
            <h3>Segurança</h3>
            <button class="btn-sair">
                Sair da Conta
            </button>
        </div>

        <p id="mensagem"></p>

    </div>

    <script>
        const form = document.getElementById("perfilForm");
        const mensagem = document.getElementById("mensagem");

        window.onload = () => {
            document.getElementById("nome").value = localStorage.getItem("nome") || "";
        };

        form.addEventListener("submit", (e) => {
            e.preventDefault();
            const nome = document.getElementById("nome").value;
            localStorage.setItem("nome", nome);
            mensagem.textContent = "Perfil atualizado com sucesso!";
            setTimeout(() => {
                mensagem.textContent = "";
            }, 3000);
        });

        document.querySelector(".btn-sair").addEventListener("click", () => {
            const confirmar = confirm("Deseja sair da conta?");
            if(confirmar){
                alert("Redirecionando para a tela de login...");
            }
        });
    </script>

</body>
</html>
