<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil</title>

    <link rel="stylesheet" href="css/perfil.css">
</head>
<body>

    <div class="perfil-container">

        <div class="perfil-header">
            <img
                src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
                alt="Foto de Perfil"
                class="foto-perfil"
            >

            <h2>Meu Perfil</h2>
        </div>

        <div class="card">
            <h3>Informações</h3>

            <p><strong>Nome:</strong> James Fernando</p>

            <p><strong>Email:</strong> jamesjames2026@gmail.com</p>

            <p><strong>Data de Cadastro:</strong> 31/05/2026</p>
        </div>

        <form id="perfilForm" class="card">

            <h3>Configurações</h3>

            <div class="form-group">
                <label for="nome">Alterar Nome</label>
                <input
                    type="text"
                    id="nome"
                    placeholder="Digite um novo nome"
                >
            </div>

            <div class="form-group">
                <label for="senha">Alterar Senha</label>
                <input
                    type="password"
                    id="senha"
                    placeholder="Digite uma nova senha"
                >
            </div>

            <p class="tema">
                <strong>Tema:</strong> ☀️ claro
            </p>

            <button type="submit" class="btn">
                Salvar Alterações
            </button>

        </form>

        <div class="card">

            <h3>Segurança</h3>

            <button class="btn-sair">
                Sair da Conta
            </button>

        </div>

        <p id="mensagem"></p>

    </div>

    <script src="js/perfil.js"></script>

</body>
</html>
